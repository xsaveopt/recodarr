# Remote encode agent. Run on a host with a GPU separate from your main
# Recodarr. Same image, mode chosen by RECODARR_MODE=agent. See
# docs/remote-agent.md for the full setup, including bandwidth and security
# notes.
#
# Token: generate with `openssl rand -hex 32` and put it in a sibling .env
# file (AGENT_TOKEN=...). Configure the same value in Recodarr's UI under
# Settings → Remote Agent.

services:
  recodarr-agent:
    image: ghcr.io/sratabix/recodarr:latest
    container_name: recodarr-agent
    restart: unless-stopped
    environment:
      RECODARR_MODE: agent
      RECODARR_AGENT_TOKEN: ${AGENT_TOKEN:?set AGENT_TOKEN in .env}
      RECODARR_AGENT_MAX_PARALLEL: "1"
      TZ: Europe/Amsterdam
    volumes:
      # The agent's working area: per-job uploads + outputs + log + state.json.
      # No media mount needed — files travel over HTTP from the main Recodarr.
      - ./agent-data:/data
    ports:
      - "8090:8090"
    # Uncomment one of the GPU blocks below.
    #
    # --- NVIDIA (Container Toolkit installed on host) ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]
    #
    # --- Intel QSV / VA-API ---
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - "render"  # match your host's render group GID
