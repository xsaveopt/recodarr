
services:
  recodarr-agent:
    image: ghcr.io/xsaveopt/recodarr:latest
    container_name: recodarr-agent
    restart: unless-stopped
    environment:
      RECODARR_MODE: agent
      RECODARR_AGENT_TOKEN: ${AGENT_TOKEN:?set AGENT_TOKEN in .env}
      RECODARR_AGENT_MAX_PARALLEL: "1"
      TZ: Europe/Amsterdam
    volumes:
      - ./agent-data:/data
    ports:
      - "8090:8090"
