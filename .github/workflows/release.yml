name: CI

on:
  push:
    branches: ["**"]
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v7
        with:
          node-version: 26

      - name: Install pnpm
        run: npm install -g "pnpm@$(node -p "require('./web/package.json').packageManager.split('@')[1].split('+')[0]")"

      - name: Configure pnpm store cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@v6
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Frontend typecheck
        run: pnpm run typecheck
        working-directory: web

      - name: Frontend lint
        run: pnpm run lint
        working-directory: web

      - name: Frontend format check
        run: pnpm run format:check
        working-directory: web

      - name: Frontend build
        run: pnpm run build
        working-directory: web

      - name: Go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Go build (with embedded SPA)
        run: go build -trimpath -ldflags="-s -w" ./...

  docker:
    name: Docker build (no push)
    needs: ci
    runs-on: ubuntu-latest
    if: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          provenance: false
          sbom: false
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-dev:
    name: Publish :dev image
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          provenance: false
          sbom: false
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/recodarr:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Publish image
    needs: ci
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/recodarr
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          provenance: false
          sbom: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
